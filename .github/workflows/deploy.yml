name: Deploy Admin

on:
  push:
    branches:
      - main
      - blog-dev
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-admin-ftp:
    name: Build & Deploy web-antdv-next
    if: github.actor != 'dependabot[bot]' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure production env
        shell: bash
        run: |
          ENV_FILE=./apps/web-antdv-next/.env.production
          sed -i "s#VITE_GLOB_API_URL=.*#VITE_GLOB_API_URL=/api#" "$ENV_FILE"
          sed -i "s#VITE_COMPRESS=.*#VITE_COMPRESS=gzip#" "$ENV_FILE"
          sed -i "s#VITE_PWA=.*#VITE_PWA=false#" "$ENV_FILE"
          cat "$ENV_FILE"

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Build
        run: pnpm run build:antdv-next

      - name: Sync admin dist to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.PRO_FTP_HOST }}
          username: ${{ secrets.ADMIN_FTP_ACCOUNT }}
          password: ${{ secrets.ADMIN_FTP_PASSWORD }}
          local-dir: ./apps/web-antdv-next/dist/

  rerun-on-failure:
    name: Rerun on failure
    needs:
      - deploy-admin-ftp
    if: failure() && fromJSON(github.run_attempt) < 10
    runs-on: ubuntu-latest
    steps:
      - name: Retry ${{ fromJSON(github.run_attempt) }} of 10
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run rerun.yml -F run_id=${{ github.run_id }}
